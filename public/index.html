<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POISSON-EDGE — Signal Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/globals.css">
</head>
<body>
<div class="layout">

  <nav class="sidebar">
    <div class="logo">PE</div>
    <a class="ni on" href="/" title="Signals">⚡</a>
    <a class="ni" href="/static/bankroll.html" title="Bankroll">◈</a>
    <a class="ni" href="/static/backtest.html" title="Backtest">↗</a>
    <div style="flex:1"></div>
    <a class="ni" href="/static/model.html" title="Λ Model">λ</a>
  </nav>

  <div class="main">
    <div class="topbar">
      <span class="tb-name">Signal Board</span>
      <span class="tb-dot">·</span>
      <span class="tb-meta" id="gw-meta">Loading…</span>
      <div class="topbar-right">
        <div class="live"><div class="live-dot"></div> Live</div>
        <button class="theme-toggle" onclick="toggleTheme()">◑</button>
      </div>
    </div>

    <div class="content">
      <div class="eyebrow">Elevated signals</div>
      <div class="hero-line"><span class="g" id="elev-count">—</span> bets tonight</div>
      <div class="hero-sub" id="hero-sub">EV ≥ +15% · probability ≥ 65% · all gates cleared</div>

      <div class="sdiv"><span class="sdiv-label">★ Elevated</span><div class="sdiv-line"></div></div>
      <div class="cards" id="elev-cards" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;margin-bottom:60px">
        <div style="color:var(--text-2);padding:24px">Computing signals…</div>
      </div>

      <div class="sdiv"><span class="sdiv-label" id="all-label">All Signals</span><div class="sdiv-line"></div></div>
      <table class="tbl" id="all-table">
        <thead>
          <tr>
            <th style="width:72px">Tier</th>
            <th>Match</th>
            <th style="text-align:right;width:80px">EV</th>
          </tr>
        </thead>
        <tbody id="all-tbody"></tbody>
      </table>
    </div>

    <div class="statusbar">
      <div>
        <div class="sb-label">Gameweek</div>
        <div class="sb-val" id="sb-gw">GW—</div>
      </div>
      <div class="sb-right">
        <div><div class="sb-val" id="sb-avg-p">—</div><div class="sb-label">Avg Prob</div></div>
        <div><div class="sb-val" id="sb-avg-ev">—</div><div class="sb-label">Avg EV</div></div>
        <div><div class="sb-val" id="sb-stake">—</div><div class="sb-label">Total Stake</div></div>
      </div>
    </div>
  </div>
</div>
<!-- Log Bet Modal -->
<div id="log-bet-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center;padding:16px">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:420px;padding:28px;position:relative">
    <button id="lbm-close" style="position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text-2);font-size:18px;cursor:pointer;line-height:1">✕</button>
    <div style="font-size:10px;font-weight:700;color:var(--gold);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:16px">Log Bet</div>
    <div id="lbm-match" style="font-size:20px;font-weight:700;letter-spacing:-0.02em;margin-bottom:4px">—</div>
    <div id="lbm-market" style="font-size:13px;color:var(--text-2);margin-bottom:20px">—</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
      <div style="background:var(--surface-2);border-radius:8px;padding:12px">
        <div style="font-size:9px;font-weight:600;color:var(--text-3);letter-spacing:0.09em;text-transform:uppercase;margin-bottom:4px">Model Odds</div>
        <div id="lbm-model-odds" style="font-size:18px;font-weight:700">—</div>
      </div>
      <div style="background:var(--surface-2);border-radius:8px;padding:12px">
        <div style="font-size:9px;font-weight:600;color:var(--text-3);letter-spacing:0.09em;text-transform:uppercase;margin-bottom:4px">Model EV</div>
        <div id="lbm-ev" style="font-size:18px;font-weight:700;color:var(--gold)">—</div>
      </div>
    </div>
    <div style="margin-bottom:14px">
      <label style="display:block;font-size:11px;font-weight:600;color:var(--text-2);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px">Actual Odds (Bet365)</label>
      <input id="lbm-actual-odds" type="number" step="0.01" min="1.01" style="width:100%;box-sizing:border-box;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:15px;font-weight:600;color:var(--text-1);outline:none">
    </div>
    <div style="margin-bottom:20px">
      <label style="display:block;font-size:11px;font-weight:600;color:var(--text-2);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px">Stake (€)</label>
      <input id="lbm-stake" type="number" step="0.01" min="0.01" style="width:100%;box-sizing:border-box;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:15px;font-weight:600;color:var(--text-1);outline:none">
    </div>
    <div id="lbm-error" style="font-size:12px;color:var(--red);margin-bottom:12px;min-height:16px"></div>
    <button id="lbm-submit" style="width:100%;background:var(--gold);color:#000;border:none;border-radius:10px;padding:13px;font-size:13px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer">Log Bet</button>
  </div>
</div>

<script src="/static/js/theme.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/signals.js"></script>
</body>
</html>
